name: morning-briefing

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run briefing
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: copilot -p "$(cat prompts/morning-briefing.md)" --no-ask-user > briefing.md

      - name: Output
        run: cat briefing.md
